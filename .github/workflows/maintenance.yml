name: Scheduled Maintenance

on:
  schedule:
    # Run daily at 03:00 UTC (low-traffic window)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────
  # Health check all production apps
  # ──────────────────────────────────────────────────────────
  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_HEALTH_CHECKS != 'false' }}
    steps:
      - name: Check customer app
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.CUSTOMER_APP_URL }}/api/health" || echo "000")
          echo "Customer: $STATUS"
          [ "$STATUS" = "200" ] || echo "::warning::Customer app health check returned $STATUS"

      - name: Check driver app
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.DRIVER_APP_URL }}/api/health" || echo "000")
          echo "Driver: $STATUS"
          [ "$STATUS" = "200" ] || echo "::warning::Driver app health check returned $STATUS"

      - name: Check maker app
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.MAKER_APP_URL }}/api/health" || echo "000")
          echo "Maker: $STATUS"
          [ "$STATUS" = "200" ] || echo "::warning::Maker app health check returned $STATUS"

      - name: Check admin app
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.ADMIN_APP_URL }}/api/health" || echo "000")
          echo "Admin: $STATUS"
          [ "$STATUS" = "200" ] || echo "::warning::Admin app health check returned $STATUS"

  # ──────────────────────────────────────────────────────────
  # Dependency security audit
  # ──────────────────────────────────────────────────────────
  security-audit:
    name: Weekly Security Audit
    runs-on: ubuntu-latest
    # Only run on Mondays
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 3 * * 1'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for vulnerabilities
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Create issue on high severity
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: High-severity dependency vulnerabilities found',
              body: `The weekly security audit found high-severity vulnerabilities.\n\nRun \`pnpm audit\` locally to see details.\n\nTriggered by: ${context.workflow} run ${context.runId}`,
              labels: ['security', 'dependencies'],
            })
