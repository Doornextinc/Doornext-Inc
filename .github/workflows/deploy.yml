name: Deploy

# Deployment sequence (expand/migrate/contract safe):
#   1. migrate-database  — additive schema changes applied first
#   2. deploy-*          — app code deployed against up-to-date schema
#   3. readiness checks  — deep dependency probes after each deploy
#   4. notify-failure    — Slack alert on any failure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options: [all, customer, driver, maker, admin]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel in-flight deploys

jobs:
  # ──────────────────────────────────────────────────────────
  # Determine which apps changed (skip unchanged apps on push)
  # ──────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      customer: ${{ steps.filter.outputs.customer }}
      driver:   ${{ steps.filter.outputs.driver }}
      maker:    ${{ steps.filter.outputs.maker }}
      admin:    ${{ steps.filter.outputs.admin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            customer:
              - 'apps/customer/**'
              - 'packages/**'
              - 'turbo.json'
              - 'pnpm-lock.yaml'
            driver:
              - 'apps/driver/**'
              - 'packages/**'
              - 'turbo.json'
              - 'pnpm-lock.yaml'
            maker:
              - 'apps/maker/**'
              - 'packages/**'
              - 'turbo.json'
              - 'pnpm-lock.yaml'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
              - 'turbo.json'
              - 'pnpm-lock.yaml'

  # ──────────────────────────────────────────────────────────
  # STEP 1: Run additive DB migrations BEFORE any app deploys.
  #
  # Expand/migrate/contract (EMC) strategy:
  #   • This job runs additive migrations (new tables, columns,
  #     indexes, functions) — safe to apply before new code.
  #   • Destructive/contract migrations (DROP COLUMN, etc.) must
  #     be applied separately AFTER all apps are updated and the
  #     old column is no longer referenced in code.
  #   • Mark contract migrations with a -- CONTRACT: prefix in
  #     their SQL file and apply them manually via workflow_dispatch.
  # ──────────────────────────────────────────────────────────
  migrate-database:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: detect-changes
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migrations (naming + no duplicates)
        run: |
          echo "Checking migration file naming convention..."
          for f in supabase/migrations/*.sql; do
            filename=$(basename "$f")
            if ! [[ "$filename" =~ ^[0-9]{3}_[a-z0-9_]+\.sql$ ]]; then
              echo "ERROR: '$filename' does not follow NNN_description.sql convention"
              exit 1
            fi
          done
          numbers=$(ls supabase/migrations/*.sql | xargs -I{} basename {} | cut -d_ -f1 | sort)
          dupes=$(echo "$numbers" | uniq -d)
          if [ -n "$dupes" ]; then
            echo "ERROR: Duplicate migration numbers: $dupes"
            exit 1
          fi
          echo "Migrations validated ✓"

      - name: Run migrations
        run: |
          supabase db push \
            --db-url "${{ secrets.SUPABASE_DB_URL }}" \
            --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ──────────────────────────────────────────────────────────
  # STEP 2a: Deploy customer app (after migrations succeed)
  # ──────────────────────────────────────────────────────────
  deploy-customer:
    name: Deploy Customer App
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate-database]
    if: |
      needs.detect-changes.outputs.customer == 'true' ||
      github.event.inputs.app == 'customer' ||
      github.event.inputs.app == 'all'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_CUSTOMER }}
          vercel-args:       '--prod'
          working-directory: apps/customer

      - name: Liveness check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.CUSTOMER_APP_URL }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Liveness check failed with status $STATUS"
            exit 1
          fi
          echo "Customer liveness check passed ✓"

      - name: Readiness check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_WEBHOOK_SECRET }}" \
            "${{ secrets.CUSTOMER_APP_URL }}/api/readiness")
          if [ "$STATUS" != "200" ]; then
            echo "Readiness check failed with status $STATUS — deploy may be degraded"
            exit 1
          fi
          echo "Customer readiness check passed ✓"

  # ──────────────────────────────────────────────────────────
  # STEP 2b: Deploy driver app
  # ──────────────────────────────────────────────────────────
  deploy-driver:
    name: Deploy Driver App
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate-database]
    if: |
      needs.detect-changes.outputs.driver == 'true' ||
      github.event.inputs.app == 'driver' ||
      github.event.inputs.app == 'all'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DRIVER }}
          vercel-args:       '--prod'
          working-directory: apps/driver

      - name: Liveness check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DRIVER_APP_URL }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Liveness check failed with status $STATUS"
            exit 1
          fi
          echo "Driver liveness check passed ✓"

      - name: Readiness check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_WEBHOOK_SECRET }}" \
            "${{ secrets.DRIVER_APP_URL }}/api/readiness")
          if [ "$STATUS" != "200" ]; then
            echo "Readiness check failed with status $STATUS"
            exit 1
          fi
          echo "Driver readiness check passed ✓"

  # ──────────────────────────────────────────────────────────
  # STEP 2c: Deploy maker app
  # ──────────────────────────────────────────────────────────
  deploy-maker:
    name: Deploy Maker App
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate-database]
    if: |
      needs.detect-changes.outputs.maker == 'true' ||
      github.event.inputs.app == 'maker' ||
      github.event.inputs.app == 'all'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_MAKER }}
          vercel-args:       '--prod'
          working-directory: apps/maker

      - name: Liveness check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.MAKER_APP_URL }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Liveness check failed with status $STATUS"
            exit 1
          fi
          echo "Maker liveness check passed ✓"

      - name: Readiness check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_WEBHOOK_SECRET }}" \
            "${{ secrets.MAKER_APP_URL }}/api/readiness")
          if [ "$STATUS" != "200" ]; then
            echo "Readiness check failed with status $STATUS"
            exit 1
          fi
          echo "Maker readiness check passed ✓"

  # ──────────────────────────────────────────────────────────
  # STEP 2d: Deploy admin app
  # ──────────────────────────────────────────────────────────
  deploy-admin:
    name: Deploy Admin App
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate-database]
    if: |
      needs.detect-changes.outputs.admin == 'true' ||
      github.event.inputs.app == 'admin' ||
      github.event.inputs.app == 'all'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          vercel-args:       '--prod'
          working-directory: apps/admin

      - name: Liveness check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.ADMIN_APP_URL }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Liveness check failed with status $STATUS"
            exit 1
          fi
          echo "Admin liveness check passed ✓"

      - name: Readiness check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_WEBHOOK_SECRET }}" \
            "${{ secrets.ADMIN_APP_URL }}/api/readiness")
          if [ "$STATUS" != "200" ]; then
            echo "Readiness check failed with status $STATUS"
            exit 1
          fi
          echo "Admin readiness check passed ✓"

  # ──────────────────────────────────────────────────────────
  # Notify on deployment failure
  # ──────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [migrate-database, deploy-customer, deploy-driver, deploy-maker, deploy-admin]
    if: failure()
    steps:
      - name: Post failure to Slack
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 *Doornext Deploy Failed* on `${{ github.ref_name }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
